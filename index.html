<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meow Pronunciation Coach 🐾</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght=500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Comfortaa', cursive, sans-serif; }
        .correct { color: #10B981; font-weight: bold; }
        .incorrect { color: #EF4444; font-weight: bold; text-decoration: line-through; }
        
        /* Hiệu ứng tai mèo ở phía trên chiếc hộp đựng ứng dụng */
        .cat-box::before {
            content: "▲";
            color: white;
            text-shadow: 0 -4px 10px rgba(244, 63, 94, 0.1);
            font-size: 38px;
            position: absolute;
            top: -28px;
            left: 40px;
        }
        .cat-box::after {
            content: "▲";
            color: white;
            text-shadow: 0 -4px 10px rgba(244, 63, 94, 0.1);
            font-size: 38px;
            position: absolute;
            top: -28px;
            right: 40px;
        }

        /* --- CSS TẠO HÌNH ĐẦU MÈO CHO NÚT BẤM --- */
        .cat-head-btn {
            position: relative;
            width: 120px;
            height: 100px;
            background-color: #f472b6; /* bg-pink-400 */
            border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: none;
            box-shadow: 0 8px 15px rgba(244, 114, 182, 0.3);
        }

        /* Tai mèo bên trái và bên phải */
        .cat-head-btn::before, .cat-head-btn::after {
            content: "";
            position: absolute;
            top: -8px;
            width: 32px;
            height: 35px;
            background-color: inherit;
            border-radius: 30% 70% 30% 70% / 30% 70% 30% 70%;
            z-index: -1;
            transition: all 0.3s ease;
        }
        .cat-head-btn::before {
            left: 6px;
            transform: rotate(-35deg);
        }
        .cat-head-btn::after {
            right: 6px;
            transform: rotate(35deg);
            border-radius: 70% 30% 70% 30% / 70% 30% 70% 30%;
        }

        /* Chi tiết mắt và râu bên trong mặt mèo */
        .cat-eyes {
            position: absolute;
            top: 32px;
            width: 76px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .cat-eyes::before, .cat-eyes::after {
            content: "";
            width: 10px;
            height: 10px;
            background-color: #fff;
            border-radius: 50%;
        }

        .cat-whiskers-l, .cat-whiskers-r {
            position: absolute;
            top: 42px;
            width: 20px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.6);
            pointer-events: none;
        }
        .cat-whiskers-l { left: -10px; transform: rotate(10deg); box-shadow: 0 8px 0 rgba(255, 255, 255, 0.6); }
        .cat-whiskers-r { right: -10px; transform: rotate(-10deg); box-shadow: 0 8px 0 rgba(255, 255, 255, 0.6); }
    </style>
</head>
<body class="bg-pink-100/60 min-h-screen flex items-center justify-center p-4 relative overflow-x-hidden">
    
    <div class="absolute text-pink-200 text-4xl top-10 left-10 select-none animate-bounce">🐾</div>
    <div class="absolute text-pink-200 text-4xl bottom-10 right-10 select-none animate-bounce" style="animation-delay: 1s;">🐱</div>
    <div class="absolute text-pink-200 text-3xl top-1/2 right-8 select-none opacity-50">✨</div>
    <div class="absolute text-pink-200 text-3xl bottom-1/3 left-8 select-none opacity-50">✨</div>

    <div class="cat-box bg-white p-8 rounded-3xl shadow-xl max-w-md w-full border-4 border-pink-200 relative z-10">
        
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-pink-500 flex items-center gap-1.5">
                <span>🐱</span> Meow Coach
            </h1>
            <span id="progress-text" class="text-xs bg-pink-200 text-pink-700 px-3 py-1 rounded-full font-bold shadow-xs">Câu 1/9</span>
        </div>
        
        <div class="mb-6">
            <p class="text-xs text-pink-400 font-bold mb-1 flex items-center gap-1">🐾 Thử thách phát âm Mỹ:</p>
            <div id="target-text" class="text-lg font-bold text-gray-700 bg-pink-50 p-4 rounded-2xl border-2 border-dashed border-pink-200 min-h-[60px] flex items-center relative">
                Loading...
            </div>
            <div class="flex justify-between items-center mt-2">
                <span id="auto-next-status" class="text-xs text-emerald-500 font-bold animate-pulse hidden">✨ Meo! Xuất sắc >90%! Đổi câu...</span>
                <button onclick="changeSentence()" class="text-xs text-pink-400 hover:text-pink-600 font-bold ml-auto transition-colors">
                    Next câu khác 🐾
                </button>
            </div>
        </div>

        <div class="flex flex-col items-center justify-center gap-3 my-8">
            <div class="relative pt-4"> 
                <button id="btn-record" onclick="toggleListening()" class="cat-head-btn text-white focus:outline-none ring-8 ring-pink-100 hover:scale-105 transition-all">
                    <div class="cat-eyes"></div>
                    <div class="cat-whiskers-l"></div>
                    <div class="cat-whiskers-r"></div>
                    
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mt-4 mb-0.5 z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                    </svg>
                    <span class="text-[9px] font-black tracking-wider z-10 uppercase">BẤM NÓI</span>
                </button>
            </div>
            <p id="status" class="text-xs text-pink-400 font-bold text-center mt-3 bg-pink-50/80 px-4 py-1 rounded-full">Nhấn đầu mèo và nói cho mèo nghe nha...</p>
        </div>

        <div class="space-y-4 pt-4 border-t-2 border-dashed border-pink-100">
            <div>
                <p class="text-xs text-gray-400 font-bold">Mèo nghe thấy:</p>
                <p id="result-text" class="text-gray-600 italic min-h-[24px] text-sm bg-gray-50/50 p-2 rounded-xl border border-gray-100 mt-1">—</p>
            </div>
            
            <div>
                <p class="text-xs text-gray-400 font-bold">Mèo sửa lỗi:</p>
                <div id="analysis-text" class="text-sm min-h-[24px] bg-gray-50/50 p-2 rounded-xl border border-gray-100 mt-1">—</div>
            </div>

            <div>
                <p class="text-xs text-gray-400 font-bold flex justify-between">
                    <span>Điểm Meow-score:</span>
                    <span id="score-text" class="text-sm font-black text-pink-500">0%</span>
                </p>
                <div class="w-full bg-pink-100 h-3.5 rounded-full overflow-hidden mt-1 p-0.5 border border-pink-200">
                    <div id="score-bar" class="bg-gradient-to-r from-pink-400 to-rose-400 h-full w-0 rounded-full transition-all duration-500"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sentences = [
            "How is the weather today?",
            "I would like to order a cup of coffee.",
            "Practice makes perfect.",
            "Google Speech API is powerful.",
            "Can you tell me how to get to the station?",
            "A cat is very beautiful",
            "The sky is blue",
            "Do you love me?",
            "I want to have a lot of money"
        ];

        let currentSentenceIndex = 0;
        let autoNextTimeout = null; 

        const targetTextElem = document.getElementById('target-text');
        const progressTextElem = document.getElementById('progress-text');
        const autoNextStatusElem = document.getElementById('auto-next-status');
        const btnRecord = document.getElementById('btn-record');
        const statusElem = document.getElementById('status');
        const resultTextElem = document.getElementById('result-text');
        const analysisElem = document.getElementById('analysis-text');
        const scoreBar = document.getElementById('score-bar');
        const scoreText = document.getElementById('score-text');

        targetTextElem.innerText = sentences[currentSentenceIndex];
        progressTextElem.innerText = `Câu 1/${sentences.length}`;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false; 
            recognition.lang = 'en-US'; 
            recognition.interimResults = false; 

            recognition.onstart = () => {
                isListening = true;
                if(autoNextTimeout) clearTimeout(autoNextTimeout);
                autoNextStatusElem.classList.add('hidden');

                statusElem.innerText = "Mèo đang lắng nghe... Ngấu meo! 🐱";
                btnRecord.style.backgroundColor = "#f43f5e"; /* Đổi sang màu rose-500 bằng JS */
                btnRecord.classList.remove('ring-pink-100');
                btnRecord.classList.add('animate-pulse', 'ring-rose-100');
            };

            recognition.onend = () => {
                isListening = false;
                statusElem.innerText = "Mèo đang chấm điểm nha...";
                btnRecord.style.backgroundColor = ""; /* Trở về mặc định màu hồng cũ */
                btnRecord.classList.remove('animate-pulse', 'ring-rose-100');
                btnRecord.classList.add('ring-pink-100');
            };

            recognition.onresult = (event) => {
                const speechToText = event.results[0][0].transcript;
                resultTextElem.innerText = speechToText;
                evaluatePronunciation(targetTextElem.innerText, speechToText);
            };

            recognition.onerror = (event) => {
                statusElem.innerText = "Hic, không nghe rõ! Thử lại nha sen? (🐾)";
            };
        } else {
            alert("Trình duyệt không hỗ trợ Web Speech API. Hãy mở bằng Google Chrome nhé!");
        }

        function toggleListening() {
            if (!recognition) return;
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        function changeSentence() {
            if(autoNextTimeout) clearTimeout(autoNextTimeout);
            autoNextStatusElem.classList.add('hidden');

            currentSentenceIndex = (currentSentenceIndex + 1) % sentences.length;
            
            targetTextElem.innerText = sentences[currentSentenceIndex].trim();
            progressTextElem.innerText = `Câu ${currentSentenceIndex + 1}/${sentences.length}`;
            
            resultTextElem.innerText = "—";
            analysisElem.innerHTML = "—";
            scoreBar.style.width = "0%";
            scoreText.innerText = "0%";
            statusElem.innerText = "Nhấn đầu mèo và bắt đầu nói...";
        }

        function cleanWord(word) {
            return word.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g, "");
        }

        // HÀM PHÁT ÂM THANH MÈO: MEOW (KHI ĐẠT >90%) HOẶC GỪ RỪ RỪ (KHI <90%)
        function playMeowSound(type = 'meow') {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                const ctx = new AudioContext();
                const now = ctx.currentTime;

                if (type === 'meow') {
                    // --- TIẾNG MÈO KÊU MEOW CHÚC MỪNG ---
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'triangle';
                    
                    osc.frequency.setValueAtTime(380, now);
                    osc.frequency.exponentialRampToValueAtTime(720, now + 0.12);
                    osc.frequency.exponentialRampToValueAtTime(300, now + 0.45);
                    
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.2, now + 0.06);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now);
                    osc.stop(now + 0.45);
                    
                } else {
                    // --- TIẾNG MÈO GỪ RỪ RỪ (PURR) AN ỦI ---
                    // Sử dụng bộ tạo dao động tần số rất thấp kết hợp điều chế biên độ liên tục
                    const osc = ctx.createOscillator();
                    const modulator = ctx.createOscillator();
                    const modGain = ctx.createGain();
                    const mainGain = ctx.createGain();
                    
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(75, now); // Tần số gừ thấp trầm ấm
                    
                    modulator.type = 'sine';
                    modulator.frequency.setValueAtTime(28, now); // Nhịp rung gừ rừ rừ
                    modGain.gain.setValueAtTime(25, now); 
                    
                    mainGain.gain.setValueAtTime(0, now);
                    mainGain.gain.linearRampToValueAtTime(0.25, now + 0.1);
                    mainGain.gain.setValueAtTime(0.25, now + 0.7);
                    mainGain.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
                    
                    // Tạo bộ lọc tần số thấp để tiếng gừ mềm, không bị chói tai
                    const filter = ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(140, now);
                    
                    modulator.connect(modGain);
                    modGain.connect(osc.frequency);
                    osc.connect(filter);
                    filter.connect(mainGain);
                    mainGain.connect(ctx.destination);
                    
                    modulator.start(now);
                    osc.start(now);
                    modulator.stop(now + 0.9);
                    osc.stop(now + 0.9);
                }
            } catch (e) {
                console.log("AudioContext gặp lỗi hoặc trình duyệt chưa cấp quyền âm thanh:", e);
            }
        }

        function triggerFireworks() {
            const duration = 1.5 * 1000; 
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 25, spread: 360, ticks: 60, zIndex: 99, colors: ['#ffb7b2', '#ffdac1', '#e2f0cb', '#b5ead7', '#ffffff'] };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 40 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.1, 0.4), y: Math.random() - 0.2 } 
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.6, 0.9), y: Math.random() - 0.2 } 
                }));
            }, 250);
        }

        function evaluatePronunciation(target, spoken) {
            const targetWords = target.trim().split(/\s+/);
            const spokenWords = spoken.trim().split(/\s+/);
            
            let htmlAnalysis = [];
            let correctCount = 0;

            targetWords.forEach((tWord) => {
                const cleanedT = cleanWord(tWord);
                const matchIndex = spokenWords.findIndex(sWord => cleanWord(sWord) === cleanedT);

                if (matchIndex !== -1) {
                    htmlAnalysis.push(`<span class="correct">${tWord}</span>`);
                    spokenWords.splice(matchIndex, 1);
                    correctCount++;
                } else {
                    htmlAnalysis.push(`<span class="incorrect">${tWord}</span>`);
                }
            });

            const scorePercentage = Math.round((correctCount / targetWords.length) * 100);

            analysisElem.innerHTML = htmlAnalysis.join(" ");
            scoreBar.style.width = `${scorePercentage}%`;
            scoreText.innerText = `${scorePercentage}%`;

            if (scorePercentage > 90) {
                statusElem.innerText = "Meo meo! Đỉnh quá sen ơi! 🎉";
                autoNextStatusElem.classList.remove('hidden');
                
                // Phát tiếng Meow dễ thương và bắn pháo hoa
                playMeowSound('meow');
                triggerFireworks();
                
                autoNextTimeout = setTimeout(() => {
                    changeSentence();
                }, 2500);
            } else {
                statusElem.innerText = "Hụt mất rồi! Mèo đang gừ giận/an ủi đó nha~";
                // Phát tiếng mèo gừ trầm (purr) khi điểm thấp
                playMeowSound('purr');
            }
        }
    </script>
</body>
</html>
